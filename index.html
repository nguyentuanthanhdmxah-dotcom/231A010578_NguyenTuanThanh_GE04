<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Movie Discovery App</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Modal chung */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5);
    }
    .modal .modal-content {
      background-color: #fff;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
      position: relative;
    }
    .modal .modal-content iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 6px;
    }
    .modal .modal-content span {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
    }
    body.dark-mode {
      background-color: #121212;
      color: #f5f5f5;
    }
    body.dark-mode header, body.dark-mode .modal-content {
      background-color: #1e1e1e;
      color: #f5f5f5;
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 Movie App</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="231A010578_NguyenTuanThanh_bt34.html">Bài 34</a>
  </nav>

  <button id="toggleTheme">🌙</button>
  <button id="showProjectBtn">ℹ️ Mô tả dự án</button>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside>
    <h3>Tìm kiếm</h3>
    <input type="text" id="searchInput" placeholder="Nhập tên phim...">

    <h3>Thể loại</h3>
    <div id="genreList"></div>
  </aside>

  <!-- MAIN -->
  <main id="movieList"></main>

</div>

<!-- MODAL CHI TIẾT PHIM -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<!-- MODAL MÔ TẢ DỰ ÁN -->
<div id="projectModal" class="modal">
  <div class="modal-content">
    <span id="closeProjectModal">&times;</span>
    <iframe src="mota.html"></iframe>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  // Modal dự án
  const projectModal = document.getElementById("projectModal");
  const showProjectBtn = document.getElementById("showProjectBtn");
  const closeProjectModal = document.getElementById("closeProjectModal");

  showProjectBtn.onclick = () => {
    projectModal.style.display = "block";
  };

  closeProjectModal.onclick = () => {
    projectModal.style.display = "none";
  };

  // Modal phim (đã có trong app.js)
  const modal = document.getElementById("modal");
  const modalBody = document.getElementById("modalBody");
  const closeModal = document.getElementById("closeModal");

  closeModal.onclick = () => {
    modal.classList.add("hidden");
  };

  // Dark mode
  const toggleBtn = document.getElementById("toggleTheme");
  toggleBtn.onclick = () => {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
  };

  if(localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
  }
</script>

</body>
</html>
