<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

</head>

  <button id="toggleTheme" aria-label="Chuyển đổi giao diện sáng/tối">🌙</button>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <aside>
    <h3>Tìm kiếm</h3>
    <input type="text" id="searchInput" placeholder="Nhập tên phim..." aria-label="Ô tìm kiếm phim" />

    <div id="genreList" role="group" aria-label="Danh sách thể loại phim"></div>

  <!-- MAIN -->
  <main id="movieList" aria-live="polite"></main>

<!-- MODAL -->
<div id="modal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
  <div class="modal-content">
    <span id="closeModal" aria-label="Đóng cửa sổ thông tin" role="button" tabindex="0">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/app.js"></script>
